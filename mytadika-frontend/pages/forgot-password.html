<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | MyTadika</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FFD700', secondary: '#FF8C42',
            bg: '#FFFDF5', surface: '#FFFFFF',
            'surface-high': '#F7F2E9',
            ink: '#4A3F35', 'ink-muted': '#857668'
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          borderRadius: { DEFAULT: '2rem', full: '9999px' }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-ink min-h-screen flex items-center justify-center p-4">

<div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-primary opacity-20 blob -z-10"></div>

<main class="w-full max-w-md bg-surface rounded-xl p-8 md:p-12" style="box-shadow:var(--shadow-float)">
  <!-- Logo -->
  <div class="flex items-center gap-3 mb-8">
    <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center">
      <span class="material-symbols-outlined text-ink text-2xl" style="font-variation-settings:'FILL' 1">wb_sunny</span>
    </div>
    <span class="text-xl font-extrabold text-ink">MyTadika</span>
  </div>

  <a href="/pages/login.html" class="inline-flex items-center gap-1 text-secondary hover:underline font-bold text-sm mb-6">
    <span class="material-symbols-outlined text-lg">arrow_back</span> Back to Login
  </a>

  <h2 class="text-2xl font-extrabold text-ink mb-2">Forgot Password?</h2>
  <p class="text-ink-muted font-medium mb-8">Enter your email and we'll send a reset link.</p>

  <div id="error-msg"   class="error-banner   mb-4 hidden"></div>
  <div id="success-msg" class="success-banner mb-4 hidden"></div>

  <form id="forgot-form" class="space-y-5">
    <div class="space-y-1">
      <label class="block text-sm font-bold text-ink-muted px-2" for="email">Email Address</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-ink-muted pointer-events-none">mail</span>
        <input id="email" type="email" required autocomplete="email" placeholder="hello@example.com"
          class="input-pill" style="padding-left:3rem">
      </div>
    </div>
    <button type="submit" id="submit-btn" class="btn-primary">
      <span id="btn-text">Send Reset Link</span>
      <span class="material-symbols-outlined">send</span>
    </button>
  </form>
</main>

<script type="module" src="../js/pages/forgot-password.js"></script>
</body>
</html>
